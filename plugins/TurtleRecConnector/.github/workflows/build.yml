name: Build TurtleRecConnector DLL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TurtleRecConnector.csproj

      - name: Build
        run: dotnet build TurtleRecConnector.csproj -c Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurtleRecConnector
          path: bin/Release/net472/TurtleRecConnector.dll
